<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="UTF-8"/>
    <link rel="icon" href="/ico.png"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="description" itemprop="description" content="Vorest个人网站 - Anime Summer Sky Theme" />
    <meta itemprop="name" content="Vorest's Personal Website"/>
    <meta itemprop="image" content="/ico.png"/>
    
    <!-- 资源优化提示 -->
    <!-- DNS预解析（低成本） -->
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    
    <!-- 预连接（中需、提高在流量时需要 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    
    <!-- Anime Summer Sky Theme Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- 预加载关键模块 - 聚集资源加载，提高首屏性能 -->
    <link rel="modulepreload" href="/src/main.js">
    
    <title>Vorest's Personal Website</title>
    <script>
      (function () {
        const { history, location } = window
        const searchParams = new URLSearchParams(location.search)
        const redirect = searchParams.get('__spa')

        // 还原 GitHub Pages 404 中转过来的 history 路径。
        if (redirect && redirect.startsWith('/')) {
          history.replaceState(null, '', redirect)
          return
        }

        if (!location.hash.startsWith('#/')) {
          return
        }

        const hashTarget = location.hash.slice(1)
        const target =
          (hashTarget.startsWith('/') && hashTarget !== '/')
            ? hashTarget
            : `${location.pathname}${location.search}` || '/'

        history.replaceState(null, '', target)
      })()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
